apiVersion: apps/v1
kind: Deployment
metadata:
  name: labfatagile-deployment
  labels:
    app: labfatagile
spec:
  replicas: 2
  selector:
    matchLabels:
      app: labfatagile
  template:
    metadata:
      labels:
        app: labfatagile
    spec:
      containers:
      - name: labfatagile-container
        # The 'IMAGE_TAG' placeholder is updated dynamically by your Jenkins pipeline
        image: kirti75/labfatagile:IMAGE_TAG
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: labfatagile-service
spec:
  type: LoadBalancer
  selector:
    app: labfatagile
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
